name: Lint

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download actionlint
        id: get_actionlint
        shell: bash
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Check workflow files
        shell: bash
        run: ${{ steps.get_actionlint.outputs.executable }} -color

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Create virtual environment
        shell: bash
        run: |
          set -euo pipefail
          # --seed installs pip/setuptools/wheel into the venv.
          # This avoids: "No module named pip" on GitHub Actions.
          uv venv --seed

      - name: Install project dependencies
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate

          if [ -f requirements-dev.txt ]; then
            uv pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            uv pip install -r requirements.txt
          fi

          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            uv pip install -e .
          else
            echo "No editable Python package metadata found; skipping uv pip install -e ."
          fi

          uv pip install ruff

      - name: Run Ruff
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate

          TARGETS=()
          for path in src tests scripts integrations/openenv/envs/omnibench_aegis_env; do
            if [ -e "$path" ]; then
              TARGETS+=("$path")
            fi
          done

          if [ ${#TARGETS[@]} -eq 0 ]; then
            echo "No lint targets found."
            exit 0
          fi

          echo "Lint targets: ${TARGETS[*]}"
          ruff check "${TARGETS[@]}"

      - name: Run Python syntax compilation
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate

          TARGETS=()
          for path in src tests scripts integrations/openenv/envs/omnibench_aegis_env; do
            if [ -e "$path" ]; then
              TARGETS+=("$path")
            fi
          done

          if [ ${#TARGETS[@]} -eq 0 ]; then
            echo "No compile targets found."
            exit 0
          fi

          python -m compileall "${TARGETS[@]}"
