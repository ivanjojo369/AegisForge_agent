name: Sync OmniBench Space to Hugging Face

on:
  push:
    branches: [main]
    paths:
      - "integrations/openenv/envs/omnibench_aegis_env/**"
      - ".github/workflows/sync-omnibench-space.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-omnibench-space
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync Space subdirectory to Hugging Face
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: AGIreflex/omnibench-env
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          subdirectory: integrations/openenv/envs/omnibench_aegis_env
          