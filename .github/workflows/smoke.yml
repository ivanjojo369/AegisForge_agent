name: Smoke

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  omnibench-space-smoke:
    name: OmniBench Space Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CONTEXT_DIR: integrations/openenv/envs/omnibench_aegis_env
      IMAGE_NAME: omnibench-aegis-env-smoke:test
      HOST: 0.0.0.0
      PORT: "8000"
      OPENENV_HOST: 0.0.0.0
      OPENENV_PORT: "8000"
      HEALTH_URL: http://127.0.0.1:8000/health
      CONTRACT_URL: http://127.0.0.1:8000/contract
      ROOT_URL: http://127.0.0.1:8000/
      DOCS_URL: http://127.0.0.1:8000/docs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build OmniBench Space Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t "$IMAGE_NAME" "$CONTEXT_DIR"

      - name: Start OmniBench Space container
        shell: bash
        run: |
          set -euo pipefail

          docker run -d \
            --name omnibench-aegis-env-smoke \
            -p 8000:8000 \
            -e HOST="${HOST}" \
            -e PORT="${PORT}" \
            -e OPENENV_HOST="${OPENENV_HOST}" \
            -e OPENENV_PORT="${OPENENV_PORT}" \
            "$IMAGE_NAME"

      - name: Wait for container to stay up
        shell: bash
        run: |
          set -euo pipefail

          sleep 3
          RUNNING="$(docker inspect -f '{{.State.Running}}' omnibench-aegis-env-smoke)"
          if [ "$RUNNING" != "true" ]; then
            echo "Container is not running."
            docker logs omnibench-aegis-env-smoke || true
            exit 1
          fi

      - name: Probe /health
        shell: bash
        run: |
          set -euo pipefail

          for i in {1..45}; do
            if curl -fsS "$HEALTH_URL" -o /tmp/health.json; then
              echo "Health endpoint is up."
              cat /tmp/health.json
              exit 0
            fi
            echo "Waiting for /health... attempt $i/45"
            docker ps || true
            sleep 2
          done

          echo "Health endpoint did not become ready in time."
          docker logs omnibench-aegis-env-smoke || true
          exit 1

      - name: Validate /health JSON
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/health.json").read_text(encoding="utf-8"))
          assert data["status"] == "ok"
          assert data["env"] == "omnibench_aegis_env"
          print("Health JSON looks valid.")
          PY

      - name: Probe /contract
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$CONTRACT_URL" -o /tmp/contract.json
          cat /tmp/contract.json

      - name: Validate /contract JSON
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/contract.json").read_text(encoding="utf-8"))
          assert data["name"] == "omnibench_aegis_env"
          assert "supported_domains" in data
          assert "supported_env_ids" in data
          assert "primary_scenarios" in data
          print("Contract JSON looks valid.")
          PY

      - name: Probe landing page
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$ROOT_URL" -o /tmp/root.html
          grep -q "omnibench_aegis_env" /tmp/root.html
          grep -q "Sprint 3 coverage" /tmp/root.html
          echo "Landing page looks valid."

      - name: Probe /docs
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$DOCS_URL" -o /tmp/docs.html
          grep -qi "swagger" /tmp/docs.html
          echo "Docs endpoint looks valid."

      - name: Print container logs on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p .github-artifacts
          docker logs omnibench-aegis-env-smoke > .github-artifacts/omnibench-space-smoke.log 2>&1 || true
          cat .github-artifacts/omnibench-space-smoke.log || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: omnibench-space-smoke-logs
          path: .github-artifacts/omnibench-space-smoke.log
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          docker rm -f omnibench-aegis-env-smoke || true
