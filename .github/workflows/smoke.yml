name: Smoke

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      HOST: 0.0.0.0
      PORT: "8000"
      AGENT_PORT: "8000"
      AEGISFORGE_PUBLIC_URL: http://127.0.0.1:8000
      HEALTH_URL: http://127.0.0.1:8000/health
      CARD_URL: http://127.0.0.1:8000/.well-known/agent-card.json
      IMAGE_NAME: aegisforge-smoke:test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t "$IMAGE_NAME" .

      - name: Start container
        shell: bash
        run: |
          set -euo pipefail

          docker run -d \
            --name aegisforge-smoke \
            -p 8000:8000 \
            -e HOST="${HOST}" \
            -e PORT="${PORT}" \
            -e AGENT_PORT="${AGENT_PORT}" \
            -e AEGISFORGE_PUBLIC_URL="${AEGISFORGE_PUBLIC_URL}" \
            "$IMAGE_NAME"

      - name: Wait for container to stay up
        shell: bash
        run: |
          set -euo pipefail

          sleep 3
          RUNNING="$(docker inspect -f '{{.State.Running}}' aegisforge-smoke)"
          if [ "$RUNNING" != "true" ]; then
            echo "Container is not running."
            docker logs aegisforge-smoke || true
            exit 1
          fi

      - name: Probe /health
        shell: bash
        run: |
          set -euo pipefail

          for i in {1..30}; do
            if curl -fsS "$HEALTH_URL" -o /tmp/health.out; then
              echo "Health endpoint is up."
              exit 0
            fi
            echo "Waiting for /health... attempt $i/30"
            sleep 2
          done

          echo "Health endpoint did not become ready in time."
          docker logs aegisforge-smoke || true
          exit 1

      - name: Probe agent card
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS "$CARD_URL" -o /tmp/agent-card.json

      - name: Validate agent card JSON
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          card_path = Path("/tmp/agent-card.json")
          raw = card_path.read_text(encoding="utf-8")
          data = json.loads(raw)

          assert isinstance(data, dict), "Agent card must be a JSON object."
          assert data, "Agent card JSON is empty."

          expected_any = {"name", "id", "version", "url", "capabilities", "description"}
          if not any(key in data for key in expected_any):
              raise AssertionError(
                  f"Agent card is valid JSON but missing expected top-level keys. "
                  f"Found keys: {sorted(data.keys())}"
              )

          print("Agent card JSON looks valid.")
          PY

      - name: Optional pytest smoke tests
        if: ${{ hashFiles('tests/test_smoke/*.py') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install -e .
          pytest tests/test_smoke -q

      - name: Print container logs on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p .github-artifacts
          docker logs aegisforge-smoke > .github-artifacts/docker-smoke.log 2>&1 || true
          cat .github-artifacts/docker-smoke.log || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-smoke-logs
          path: .github-artifacts/docker-smoke.log
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          docker rm -f aegisforge-smoke || true
          