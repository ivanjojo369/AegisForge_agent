# AegisForge NCP Purple Scenario Catalog (Sprint 4 Ready v3)
# Canonical catalog for AgentX-AgentBeats Phase 2 Sprint 4 Purple Benchmark mode.
# This file intentionally preserves legacy/security-arena scenarios while adding
# the 16 Sprint 4 canonical domains and NCP metadata for traceable generalist evaluation.

[catalog]
id = "aegisforge_ncp_purple_sprint4_catalog"
version = "0.3.0"
track = "agentbeats_phase2_sprint4_purple"
scenario_count = 42
legacy_scenario_count = 30
sprint4_domain_count = 16
status = "ncp_sprint4_ready"
purpose = "Local curation, runtime synthesis, regression coverage, and Purple Benchmark generalist validation with NCP traces and scorecards."
assessment_mode = "purple_benchmark"
scenario_family = "agentbeats_sprint4"
benchmark = "agentbeats_phase2_sprint4"
hardcoding_policy = "deny_answer_keys_task_specific_lookup_tables_and_oracle_fields"

[defaults]
strict_mode = true
heldout_like = true
normal_user = false
default_max_turns = 6
resolver_mode = "template_merge"
assessment_mode = "purple_benchmark"
scenario_family = "agentbeats_sprint4"
benchmark = "agentbeats_phase2_sprint4"
trace_required = true
scorecard_required = true
benchmark_scope = "controlled_only"
leaderboard_ready = true

[ncp_core]
id = "aegisforge_ncp_neuro_cognitive_purple_core"
name = "AegisForge NCP — Neuro-Cognitive Purple Core"
claim_boundary = "Computational cognitive architecture inspired by research traditions; not consciousness, personhood, or human-equivalent cognition."
architecture_signals = [
  "attention_allocation",
  "working_memory",
  "episodic_trace",
  "task_state_theory",
  "hierarchical_planning",
  "uncertainty_estimation",
  "evidence_grounding",
  "metacognitive_self_check",
  "adversarial_self_check",
  "tool_selection",
  "traceability",
  "scorecards",
]
decision_loop = ["observe", "attend", "ground", "plan", "act", "verify", "scorecard"]
reference_inspirations = [
  "Newell unified theories of cognition and symbol/problem-space framing",
  "Soar-style cognitive architecture ideas: symbolic working memory, operators, goals, and learning signals",
  "active inference: perception/action as uncertainty-reducing control under a generative task model",
  "decision making under uncertainty: expected utility, value of information, online planning, and bounded rationality",
  "reinforcement learning: state-action-reward framing, exploration control, and policy improvement without hardcoded answers",
  "probabilistic machine learning: Bayesian evidence, uncertainty, model checking, and causal caution",
  "deep learning and LLM engineering: attention, retrieval, instruction following, evaluation, latency/cost tradeoffs",
  "ML systems: reproducibility, monitoring, data/version contracts, and production-quality evaluation",
]

[competition_targets]
leaderboard_dimensions = [
  "leaderboard_performance",
  "generality",
  "cost_efficiency",
  "technical_quality",
  "innovation",
  "reproducibility",
  "fair_play",
]
required_guardrails = [
  "no_real_world_exploitation",
  "no_secret_extraction",
  "no_persistence_or_evasion",
  "no_hardcoded_answers",
  "no_task_specific_lookup_tables",
  "controlled_benchmark_only",
]

[legacy_upstream]
preservation_policy = "Do not delete or rename upstream/legacy adapters; keep them coexisting with local Sprint 4 domains."
adapters = [
  "officeqa",
  "crmarena",
  "crmarenapro",
