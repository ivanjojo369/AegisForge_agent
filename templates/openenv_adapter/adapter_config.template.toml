# ============================================================================
# AegisForge OpenEnv / OmniBench Adapter Config Template
# ============================================================================
# Compatibility note:
# The original template exposed these top-level keys:
#   enabled, base_url, environment_name, timeout_seconds, strict_mode
# They are preserved below for older loaders, while the structured sections add
# Sprint 4 / AgentBeats identity metadata for newer runners and telemetry.
# ============================================================================

enabled = false
base_url = "http://127.0.0.1:8010"
environment_name = "openenv-default"
timeout_seconds = 30
strict_mode = false

[adapter]
name = "openenv_adapter"
provider = "openenv"
track = "openenv"
enabled = false
strict_mode = false
timeout_seconds = 30
base_url = "http://127.0.0.1:8010"
environment_name = "openenv-default"

[benchmark]
name = "AgentX-AgentBeats Phase 2 Sprint 4"
assessment_mode = "purple_benchmark"
scenario_family = "agentbeats_sprint4"
leaderboard_ready = false
benchmark_scope = "controlled_only"

[identity]
# These are defaults/placeholders for generated configs. Scenario-specific
# payload builders should override them with one of the 16 Sprint 4 scenarios.
domain = "openenv"
scenario_id = "openenv-default"
scenario_name = "OpenEnvDefault"
upstream_track = "openenv"
category = "general"
adapter = "openenv"
assessment_mode = "purple_benchmark"
scenario_family = "agentbeats_sprint4"
benchmark = "AgentX-AgentBeats Phase 2 Sprint 4"
selected_opponent = "openenv"
source_url = ""

[service]
base_url = "http://127.0.0.1:8010"
health_path = "/health"
reset_path = "/reset"
step_path = "/step"
state_path = "/state"
timeout_seconds = 30
transport = "http"

[defaults]
live_check = true
require_success = false
strict_sprint4 = true
action = "advance"
value = 1
max_steps = 1

[telemetry]
emit_events = true
write_traces = true
write_scorecards = true
preserve_identity = true
include_track_result_metadata = true

[validation]
min_timeout_seconds = 1
max_timeout_seconds = 300
require_http_url = true
require_identity = true
require_domain = true
require_scenario_id = true
require_upstream_track = true
require_assessment_mode = true
require_scenario_family = true

[sprint4]
supported_domains = [
  "business_process",
  "game",
  "tau2",
  "multi_agent",
  "finance",
  "computer_use",
  "agent_safety",
  "coding",
  "cybersecurity",
  "research",
  "healthcare",
  "web",
  "agent_security",
  "software_testing",
  "defi",
  "legal_domain",
]
supported_categories = [
  "indirect_injection",
  "prompt_extraction",
  "pii_leak",
  "jailbreak",
  "insecure_output",
  "supply_chain",
  "secret_leak",
]
preserve_upstream_tracks = [
  "officeqa",
  "crmarena",
  "crmarenapro",
  "fieldworkarena",
  "maizebargain",
  "osworld",
  "pibench",
  "cybergym",
  "netarena",
  "tau2_agentbeats",
  "mcu_minecraft",
  "fhir_agent",
  "comtrade",
  "lambda_agent_security",
  "logomesh",
  "ethernaut",
  "agentify_bench",
]

